databases:
  - name: linkedin-lite-db
    plan: free
    databaseName: jobportal

services:
  - type: web
    name: linkedin-lite-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: DB_VENDOR
        value: postgresql
      - key: DB_HOST
        fromDatabase:
          name: linkedin-lite-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: linkedin-lite-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: linkedin-lite-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: linkedin-lite-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: linkedin-lite-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: true
      - key: SMTP_STARTTLS
        value: true
      - key: SMTP_CONNECTION_TIMEOUT
        value: 10000
      - key: SMTP_TIMEOUT
        value: 10000
      - key: SMTP_WRITE_TIMEOUT
        value: 10000
      - key: SMTP_FROM
        sync: false
