services:
  - type: web
    name: linkedin-lite-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: MYSQLHOST
        sync: false
      - key: MYSQLPORT
        sync: false
      - key: MYSQLDATABASE
        sync: false
      - key: MYSQLUSER
        sync: false
      - key: MYSQLPASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION
        value: 86400000
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTH
        value: true
      - key: SMTP_STARTTLS
        value: true
      - key: SMTP_CONNECTION_TIMEOUT
        value: 10000
      - key: SMTP_TIMEOUT
        value: 10000
      - key: SMTP_WRITE_TIMEOUT
        value: 10000
      - key: SMTP_FROM
        sync: false
