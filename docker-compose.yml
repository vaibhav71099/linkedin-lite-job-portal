services:
  mysql:
    image: mysql:8.4
    container_name: linkedin-lite-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: jobportal
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: linkedin-lite-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SERVER_PORT: 8081
      DB_USERNAME: root
      DB_PASSWORD: root123
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/jobportal?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
      JWT_SECRET: VGhpc0lzQVNlY3VyZUp3dFNlY3JldEtleUZvckRlbW9Qcm9qZWN0MTIzNDU2Nzg5MA==
      JWT_EXPIRATION: 86400000
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://frontend
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-true}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-true}
      SMTP_CONNECTION_TIMEOUT: ${SMTP_CONNECTION_TIMEOUT:-10000}
      SMTP_TIMEOUT: ${SMTP_TIMEOUT:-10000}
      SMTP_WRITE_TIMEOUT: ${SMTP_WRITE_TIMEOUT:-10000}
      SMTP_FROM: ${SMTP_FROM:-}
    ports:
      - "8082:8081"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8082
    container_name: linkedin-lite-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mysql-data:
